#
# Build the `symbols-worker` binary for every supported platform and attach the
# archives (+ SHA256 + keyless cosign signature + SLSA provenance) to the GitHub
# Release for a vX.Y.Z tag. The heavy lifting lives in the shared reusable
# workflow Query-farm/vgi-actions/.github/workflows/rust-release.yml; this file
# gates on the repo's own CI suite and supplies the worker-specific inputs.
#
# Assets are named vgi-symbols-<tag>-<duckdb_platform>.tar.gz. The executable
# inside each archive is `symbols-worker`, used directly as a DuckDB vgi
# LOCATION:
#   ATTACH 'symbols' (TYPE vgi, LOCATION '/path/to/symbols-worker');
#
# Release flow:
#   1. Bump [workspace.package] version in Cargo.toml; sync Cargo.lock.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
name: Release binaries

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Gate the release on the same unit + SQLLogic e2e suite as push/PR.
  # Grant the permissions ci.yml's jobs need (the supply-chain `audit` job posts a
  # check-run → checks: write). A called workflow's token is capped by this job's
  # grant, and the release top-level default (contents: read) alone would make the
  # audit job's escalation exceed the cap → the whole run fails to start.
  ci:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci.yml

  release:
    needs: [ci]
    permissions:
      contents: write     # create Release + upload assets
      id-token: write     # keyless cosign sign-blob + provenance (sigstore OIDC)
      attestations: write # SLSA build-provenance attestation
    uses: Query-farm/vgi-actions/.github/workflows/rust-release.yml@v1
    secrets: inherit
    with:
      bin: symbols-worker
      asset_prefix: vgi-symbols
      version_check_cmd: ci/check-version.sh
